name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ───────────────────────────────────────────────
  # 1) Lint Python (rapide, sans installer tout requirements)
  # ───────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check . --output-format=github

  # ───────────────────────────────────────────────
  # 2) Tests unitaires (pytest)
  # ───────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: pytest --cov=src --cov-report=term-missing

  # ───────────────────────────────────────────────
  # 3) Build Docker + smoke test du stack complet
  # ───────────────────────────────────────────────
  build-and-test:
    name: Build & Smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (cache layers)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: mlops-rh-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start stack
        run: docker compose up -d

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8000/ > /dev/null; then
              echo "API is up"
              exit 0
            fi
            sleep 2
          done
          echo "API did not start in time"
          docker compose logs
          exit 1

      - name: Smoke test - root endpoint
        run: |
          response=$(curl -fs http://localhost:8000/)
          echo "Response: $response"
          echo "$response" | grep -q "API is running"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ───────────────────────────────────────────────
  # 3) Push image vers GHCR (uniquement sur main)
  # ───────────────────────────────────────────────
  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
